<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ballot box body -->
  <rect x="8" y="24" width="48" height="34" rx="4" fill="#1B3A6B" stroke="#2E5FAC" stroke-width="2"/>
  <!-- Box lid -->
  <rect x="6" y="20" width="52" height="8" rx="3" fill="#2E5FAC" stroke="#1B3A6B" stroke-width="1.5"/>
  <!-- Ballot slot -->
  <rect x="22" y="22" width="20" height="4" rx="2" fill="#0a1a3a"/>
  <!-- Ballot paper -->
  <g transform="rotate(-8, 32, 16)">
    <rect x="24" y="4" width="16" height="22" rx="2" fill="#fff" stroke="#ccc" stroke-width="1"/>
    <line x1="27" y1="10" x2="37" y2="10" stroke="#C45A00" stroke-width="2" stroke-linecap="round"/>
    <line x1="27" y1="15" x2="35" y2="15" stroke="#A00000" stroke-width="2" stroke-linecap="round"/>
    <line x1="27" y1="20" x2="33" y2="20" stroke="#1B3A6B" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Decorative star (school emblem feel) -->
  <circle cx="32" cy="42" r="8" fill="none" stroke="#f0d060" stroke-width="1.5"/>
  <text x="32" y="46" text-anchor="middle" font-size="12" font-weight="bold" fill="#f0d060" font-family="sans-serif">票</text>
</svg>
